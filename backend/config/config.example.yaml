server:
  port: 8080

# 数据库：driver 填 sqlite（本地/容器默认）或 mysql（线上）
database:
  driver: sqlite
  dsn: "./data/withme.db"
  # mysql 示例：
  # driver: mysql
  # dsn: "user:password@tcp(127.0.0.1:3306)/withme?charset=utf8mb4&parseTime=true"

# Gemini API 配置（内置 Google Search grounding，无需额外搜索引擎）
# 真实密钥请写入本地 config.yaml（已 gitignore），Docker 部署时挂载覆盖 /app/config/config.yaml
gemini:
  api_key: ""
  model: "gemini-3.5-flash"

# 腾讯云内容安全（TMS）文本审核，密钥见 https://console.cloud.tencent.com/cam/capi
# secret_id / secret_key 留空则关闭审核；biz_type 可在 TMS 控制台自定义策略
tencent:
  secret_id: ""
  secret_key: ""
  region: "ap-guangzhou"
  biz_type: "default"
