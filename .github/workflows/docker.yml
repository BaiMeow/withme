name: Build & Push to GHCR

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DEPLOY_NAME: withme # argocd 仓库中 <name>/<name>-deployment.yaml

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name (GHCR requirement)
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 打 tag 时把新镜像版本写回 argocd 仓库，由 ArgoCD 自动部署
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Lowercase image name (GHCR requirement)
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Image tag from git tag
        id: gen-tag
        # 与 docker/metadata-action 的 semver {{version}} 保持一致：v1.2.3 -> 1.2.3
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout ArgoCD
        uses: actions/checkout@v4
        with:
          repository: BaiMeow/argocd
          token: ${{ secrets.GH_PAT }} # `GH_PAT` is a secret that contains your PAT
          path: deploy

      - name: Update ArgoCD
        run: |
          cd deploy/${{ env.DEPLOY_NAME }}
          git config user.name github-actions
          git config user.email github-actions@github.com
          sed -i "s|^\(\s*image: ${{ env.IMAGE_NAME }}:\)\S*|\1${{ steps.gen-tag.outputs.tag }}|" ${{ env.DEPLOY_NAME }}-deployment.yaml
          git add .
          if git diff --cached --quiet; then
            echo "image tag unchanged, skip"
            exit 0
          fi
          git commit -m "update(${{ env.DEPLOY_NAME }}): image ${{ steps.gen-tag.outputs.tag }}"
          git push
