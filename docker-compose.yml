services:
  withme:
    image: ghcr.io/baimeow/withme:latest
    build: .
    ports:
      - "8080:8080"
    volumes:
      # 生产配置（含 gemini.api_key、mysql dsn 等），参考 backend/config/config.example.yaml
      - ./config.yaml:/app/config/config.yaml:ro
      - withme-data:/app/data
    restart: unless-stopped

volumes:
  withme-data:
